<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIP Verifikator Tools</title>
  <meta name="description" content="Alat bantu verifikator SIP — Verifikasi dan Penyaluran Bantuan" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            body: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          },
          colors: {
            sip: {
              50:  '#ecfdf5',
              100: '#d1fae5',
              200: '#a7f3d0',
              300: '#6ee7b7',
              400: '#34d399',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="logo-sip.png" />
</head>
<body class="bg-stone-50 font-body text-stone-800 antialiased min-h-screen flex flex-col">

  <header class="bg-white border-b border-stone-200">
    <div class="max-w-lg mx-auto px-4 py-5 flex items-center gap-3">
      <img src="logo-sip.png" alt="SIP Logo" class="w-10 h-10 rounded-full object-cover shrink-0" />
      <div>
        <h1 class="text-sm font-bold text-stone-900">Verifikator SIP</h1>
        <p class="text-xs text-stone-500">Tools Verifikasi & Penyaluran Bantuan</p>
      </div>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 pt-10 pb-20 flex-1 flex flex-col items-center justify-center">
    <div class="text-center mb-8">
      <h2 class="text-lg font-extrabold text-stone-800">Pilih Form</h2>
      <p class="text-sm text-stone-400 mt-1">Pilih tahapan yang akan dikerjakan</p>
    </div>

    <div class="w-full space-y-4">
      <a href="verifikasi.html"
         class="block w-full bg-white border-2 border-amber-400 hover:border-amber-500 hover:bg-amber-50
                rounded-2xl p-6 text-center transition-all duration-150 shadow-sm hover:shadow-md">
        <span class="text-4xl block mb-2">🔍</span>
        <span class="text-base font-bold text-stone-800 block">VERIFIKASI</span>
        <span class="text-xs text-stone-500 mt-1 block">Survey data calon penerima manfaat</span>
      </a>

      <a href="penyaluran.html"
         class="block w-full bg-white border-2 border-sip-600 hover:border-sip-700 hover:bg-sip-50
                rounded-2xl p-6 text-center transition-all duration-150 shadow-sm hover:shadow-md">
        <span class="text-4xl block mb-2">📦</span>
        <span class="text-base font-bold text-stone-800 block">PENYALURAN</span>
        <span class="text-xs text-stone-500 mt-1 block">Laporan penyerahan bantuan ke penerima</span>
      </a>
    </div>

    <p class="mt-8 text-xs text-stone-400 text-center">
      Pilih form sesuai tahapan yang sedang dikerjakan
    </p>
  </main>

  <footer class="text-center text-xs text-stone-400 pb-6">
    SIP Verifikator Tools &mdash; v1.0.0
  </footer>
</body>
</html>
